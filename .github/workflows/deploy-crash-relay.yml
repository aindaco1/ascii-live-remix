name: Deploy Crash Relay

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-crash-relay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: crash-relay/package-lock.json

      - name: Install crash relay dependencies
        working-directory: crash-relay
        run: npm ci

      - name: Test crash relay
        working-directory: crash-relay
        run: npm test

      - name: Deploy crash relay
        working-directory: crash-relay
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
